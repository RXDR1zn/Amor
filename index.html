<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<title>Feliz día mi amor</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

.mensaje{
    position:absolute;
    color:#ff4d6d;
    font-size:28px;
    text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d;
    animation:subir 6s linear infinite;
}

@keyframes subir{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
<link rel="stylesheet" href="style.css"></head>

<body>

<script>

function crear(){
    let t=document.createElement("div");
    t.className="mensaje";
    t.innerHTML="❤️ Feliz día mi amor ❤️";
    t.style.left=Math.random()*100+"vw";
    t.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(t);

    setTimeout(()=>{
        t.remove();
    },6000);
}

setInterval(crear,300);

</script>



<script src="script.js"></script></body></html>
